baseURL: "https://www.dewofyouryouth.com/"
timeout: 300s
relativeURLs: false
canonifyURLs: false
title: "Dew of Your Youth"
languageCode: "en"
defaultContentLanguage: "en"
enableRobotsTXT: true
summaryLength: 40
defaultTheme: "dark"
optimizeImages: true
# Theme (modules: remove this and use [module] instead)
theme: "DoIt"
permalinks:
  posts: "/post/:slug"

imaging:
  resampleFilter: Lanczos
  quality: 85
  hint: photo

menu:
  main:
    - identifier: categories
      name: Topics
      url: "/categories/"
      weight: 3
    - identifier: dailyderja
      name: Daily Derja
      url: "https://dailyderja.com"
      weight: 50
outputs:
  home: ["HTML", "RSS", "JSON"]

params:
  version: "0.2.X"

  images:
    - "images/card.jpg"

  description: "A blog by Jacob Shore about genealogy, language learning, faith, and software — tracing family history, studying Arabic, and thinking carefully about things that matter."

  # Search-engine ownership verification (HTML-tag method).
  # Paste only the token from the meta tag's content="..." value, not the whole tag.
  # Empty values emit nothing, so it is safe to leave blank.
  verification:
    google: "" # Search Console → Settings → Ownership verification → HTML tag
    bing: "" # Bing Webmaster Tools (optional)

  author:
    name: "Jacob Shore"
    link: "https://github.com/DewofyourYouth"
    avatarUrl: "images/profile-pic.jpeg"
    blurb: "Hi, I'm Jacob. I'm a language nerd, developer, and spiritual wanderer."

  home:
    profile:
      enable: true
      title: "Dew of Your Youth"
      subtitle: "Language. Faith. Memory. Systems."
      description: "A blog about overthinking everything that matters (and some things that don't)."
      avatarUrl: "/images/logo.png"
      social: true

  header:
    themeChangeMode: select
    logo: "images/logo.png"
    name: "Dew of Your Youth"

  footer:
    enable: true

  social:
    telegram:
      url: "https://t.me/+muANXhcSRCdmMDA0"
      weight: 1
    whatsapp:
      url: "https://whatsapp.com/channel/0029VbBwSpQ7tkjIkExMTA2e"
      weight: 2
    GitHub: "DewofyourYouth"
    Ko-Fi: "dewofyouryouth"
    youtubechannel: "UC-rJLeLJVWLKQKnXyLkw3bw"
    instagram: "yaakshore"
    substack:
      url: "https://dailyderja.substack.com/"
      title: "Substack"
      weight: 12
      icon:
        Src: "/images/substack.svg"
    rss: "/index.xml"

  image:
    enable: true
    optimise: true
    lazyload: true
    lazyloadClass: "lazyload"
    lazyloadOffset: "100px"
    lazyloadPlaceholder: "/images/placeholder.png"

  search:
    enable: true
    type: "fuse"
    contentLength: 4000
    maxResultLength: 10
    snippetLength: 30
    highlightTag: "em"
    absoluteURL: false
    fuse:
      isCaseSensitive: false
      minMatchCharLength: 2
      findAllMatches: false
      location: 0
      threshold: 0.1
      distance: 100
      ignoreLocation: true
      useExtendedSearch: true
      ignoreFieldNorm: false

  page:
    library:
      js:
        site: "js/site.js"
    list:
      displayDesc: true
      displaySummary: false
    showDate: true
    showAuthor: true
    enableReadingTime: true
    showToc: true
    showShare: true
    # Show prev/next navigation within a series at the bottom of each series post
    seriesNavigation: true
    # Auto-surface related posts (by shared tags) at the bottom of every post
    related:
      enable: true
      count: 3
    toc:
      enable: true
      keepStatic: true
    code:
      maxShownLines: 10
      enable: true
      lineNos: true
      wrap: false

    # --- Disqus (comments) ---
    comment:
      enable: true # global on/off switch for comments
      disqus:
        enable: true # turn on Disqus as the provider
        shortname: "dew-blog" # <- replace

  # --- Analytics ---
  analytics:
    enable: true # master switch for analytics
    google:
      id: "G-V8B2ZNNM78" # <- replace with your GA4 Measurement ID
      anonymizeIP: true

# Optional: cookie consent banner (shown by DoIt)
cookieconsent:
  enable: true
  content:
    message: ""
    dismiss: ""
    link: ""

taxonomies:
  category: "categories"
  tag: "tags"
  series: "series"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    guessSyntax: true
    lineNos: false
